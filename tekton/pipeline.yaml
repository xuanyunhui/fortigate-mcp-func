apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: fortigate-mcp-func-deploy
spec:
  params:
    - name: repo-url
      type: string
      description: Git repository URL
    - name: revision
      type: string
      default: main
      description: Git revision (branch, tag, or commit)
    - name: image
      type: string
      default: image-registry.openshift-image-registry.svc:5000/mcp-servers/fortigate-mcp-func
      description: Target container image reference
  workspaces:
    - name: source
    - name: dockerconfig
      optional: true
  tasks:
    - name: fetch-source
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: git-clone
          - name: namespace
            value: openshift-pipelines
      params:
        - name: URL
          value: $(params.repo-url)
        - name: REVISION
          value: $(params.revision)
      workspaces:
        - name: output
          workspace: source

    - name: build-and-push
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: buildah
          - name: namespace
            value: openshift-pipelines
      runAfter:
        - fetch-source
      params:
        - name: IMAGE
          value: $(params.image):$(params.revision)
      workspaces:
        - name: source
          workspace: source
        - name: dockerconfig
          workspace: dockerconfig

    - name: deploy
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: deploy-ksvc
          - name: namespace
            value: mcp-servers
      runAfter:
        - build-and-push
      params:
        - name: image
          value: $(params.image):$(params.revision)
